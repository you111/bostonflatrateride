<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boston Flat Rate Ride</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Boston Flat Rate Ride</h1>
        <p>Your reliable transportation service in Boston.</p>
    </header>
    <main>
        <h2>Book Your Ride</h2>
        <form>
            <label for="pickup-location">Pickup Location:</label>
            <input type="text" id="pickup-location" name="pickup-location" required>
            <br>
            <label for="drop-off-location">Drop-off Location:</label>
            <input type="text" id="drop-off-location" name="drop-off-location" required>
            <br>
            <label for="pickup-time">Pickup Time:</label>
            <input type="datetime-local" id="pickup-time" name="pickup-time" required>
            <br>
            <button type="submit">Book Now</button>
        </form>
    </main>
    <footer>
        <p>Contact Us: info@bostonflatrateride.com</p>
    </footer>
</body>
</html>
